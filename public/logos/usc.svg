<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="98" fill="#FFC72C" opacity="0.15"/>
  <!-- Main circle -->
  <circle cx="100" cy="100" r="92" fill="#9D2235"/>
  <!-- Inner accent ring -->
  <circle cx="100" cy="100" r="84" fill="none" stroke="#FFC72C" stroke-width="2" opacity="0.6"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#FFC72C" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Abbreviation -->
  <text x="100" y="102" 
        font-family="Georgia, serif" 
        font-size="40" 
        font-weight="700"
        fill="#FFC72C"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="-1">USC</text>
  
  <!-- Label band -->
  <rect x="20" y="148" width="160" height="24" fill="#FFC72C" opacity="0.15" rx="2"/>
  <text x="100" y="164" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="11" 
        font-weight="600"
        fill="#FFC72C"
        text-anchor="middle"
        letter-spacing="1.5">USC</text>
</svg>